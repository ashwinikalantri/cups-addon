---
version: 1.0.5
slug: cups
name: CUPS Print Server
description: CUPS print server for network printing
url: https://github.com/ashwinikalantri/cups-addon
codenotary: ak@ashwini.co.in
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
hassio_api: true
host_network: true
map:
  - data:rw
  - share:rw
devices:
  - /dev/bus/usb
init: false
ports:
  631/tcp: 631
ports_description:
  631/tcp: CUPS web interface and printing port
options:
  admin_username: "admin"
  admin_password: "admin"
  printer_driver_deb: ""
  canon_mf4412_uri: ""
schema:
  admin_username: str
  admin_password: password
  printer_driver_deb: str
  canon_mf4412_uri: str
startup: services
